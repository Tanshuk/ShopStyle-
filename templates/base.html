{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}ShopStyle{% endblock %}</title>

    <!-- ══ INLINE LOADER STYLES — works even if style.css fails to load ══ -->
    <style>
        .page-loader {
            position: fixed; inset: 0;
            background: #ffffff;
            display: flex; align-items: center; justify-content: center;
            z-index: 9999;
            transition: opacity .5s ease, visibility .5s ease;
        }
        .page-loader.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .loader-ring {
            width: 54px; height: 54px;
            border: 4px solid #e5e7eb;
            border-top-color: #FF3F6C;
            border-radius: 50%;
            animation: spin .8s linear infinite;
            margin: 0 auto 14px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-brand {
            font-family: Georgia, serif;
            font-size: 1.5rem; font-weight: 700;
            color: #111827; text-align: center;
            display: block; margin-top: 12px;
        }
        .loader-brand span { color: #FF3F6C; }
    </style>

    <!-- ══ INLINE LOADER HIDE SCRIPT — runs immediately, no external JS needed ══ -->
    <script>
        // Hide loader on DOM ready (fast) and on full load (fallback)
        function hideLoader() {
            var el = document.getElementById('pageLoader');
            if (el) el.classList.add('hidden');
        }
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(hideLoader, 400);
        });
        window.addEventListener('load', hideLoader);
        // Absolute safety net — force hide after 3 seconds no matter what
        setTimeout(hideLoader, 3000);
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    {% block extra_css %}{% endblock %}
</head>

<body>
    <!-- Page Loader -->
    <div id="pageLoader" class="page-loader">
        <div>
            <div class="loader-ring"></div>
            <span class="loader-brand">Shop<span>Style</span></span>
        </div>
    </div>

    <!-- Navbar -->
    {% include 'partials/navbar.html' %}

    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    {% include 'partials/footer.html' %}

    <!-- Messages -->
    {% include 'partials/messages.html' %}

    <!-- Bootstrap 5.3 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="{% static 'js/main.js' %}"></script>

    {% block extra_js %}{% endblock %}
</body>
</html>
</head>
